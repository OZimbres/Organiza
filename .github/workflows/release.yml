name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build fat JAR
        run: ./gradlew shadowJar --no-daemon --warning-mode all

      - name: Determine JAR path
        id: jar
        run: echo "path=$(ls build/libs/organiza-*.jar | head -1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Organiza ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ steps.jar.outputs.path }}
          body: |
            ## Organiza ${{ github.ref_name }}

            ### Download
            Baixe o arquivo `organiza-*.jar` abaixo e execute com:
            ```
            java -jar organiza-*.jar
            ```
            > **Requisito:** Java 21 ou superior (Linux x86_64). Este JAR já inclui todas as dependências (JavaFX, SQLite).
